<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
        <title>Ultraviolet | TN</title>
        <link rel="stylesheet" href="/index.css" />
        
        <script src="/uv/uv.bundle.js" defer></script>
        <script src="/uv/uv.config.js" defer></script>
    </head>

    <body>
        <div class="flex-center logo-wrapper header-center">
            <img class="logo" src="/uv.png" alt="Ultraviolet" />
            <h1>Ultraviolet | TN</h1>
        </div>

        <form id="uv-form" class="flex-center">
            <input id="uv-search-engine" value="https://www.google.com/search?q=%s" type="hidden" />
            <input id="uv-address" type="text" placeholder="Search the web freely" />
        </form>

        <div class="desc left-margin">
            <p id="uv-error"></p>
            <pre id="uv-error-code"></pre>
        </div>

        <iframe style="display: none; width: 100%; height: 100vh; border: none;" id="uv-frame"></iframe>

        <script src="/register-sw.js" defer></script>
        <script src="/search.js" defer></script>
        <script src="/index.js" defer></script>
    </body>
</html>
